<style>
  :root {
    --dpfp-blue: #043e80;
    --dpfp-orange: #f5b500;
    --dpfp-blue-deep: #022a5c;
    --white: #FFFFFF;
    --gray-900: #1A1A1A;

  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: var(--white);
    max-width: 640px;
    width: 100%;
    padding: 72px 56px;
    text-align: center;
    border-top: 8px solid var(--dpfp-orange);
  }
  .thanks-usagi {
    width: 140px;
    height: auto;
    margin: 0 auto 32px;
    display: block;
  }
  .eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--dpfp-orange);
    font-weight: 700;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 32px;
    font-weight: 900;
    color: var(--dpfp-blue);
    line-height: 1.4;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }
  .lead {
    font-size: 15px;
    line-height: 2;
    color: var(--gray-900);
    margin-bottom: 40px;
  }
  .info {
    background: var(--gray-50);
    padding: 24px 28px;
    font-size: 13px;
    line-height: 1.9;
    color: var(--gray-500);
    text-align: left;
    margin-bottom: 40px;
  }
  .info strong { color: var(--dpfp-blue); display: block; margin-bottom: 6px; }
  .btn {
    display: inline-block;
    padding: 18px 40px;
    background: var(--dpfp-blue);
    color: var(--white);
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.1em;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--dpfp-blue-deep); }
  @media (max-width: 600px) {
    body { padding: 24px 16px; }
    .card { padding: 40px 24px; border-top-width: 6px; }
    .thanks-usagi { width: 110px; margin-bottom: 24px; }
    .eyebrow { font-size: 10px; letter-spacing: 0.25em; margin-bottom: 12px; }
    h1 { font-size: 22px; margin-bottom: 16px; }
    .lead { font-size: 14px; line-height: 1.8; margin-bottom: 28px; }
    .info { padding: 18px 20px; font-size: 12px; margin-bottom: 28px; }
